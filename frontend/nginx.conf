server {
    listen 80;

    # ─── Serve il frontend statico ───────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # ─── Health check proxy per i singoli agenti ─────────────────────────────
    # Il frontend fa GET /api/planner-status/health, /api/generator-status/health, ecc.
    # Nginx li gira internamente agli agenti — nessuna porta esposta all'esterno.
    location /api/planner-status/ {
        proxy_pass http://planner:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/generator-status/ {
        proxy_pass http://generator:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/healer-status/ {
        proxy_pass http://healer:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Proxy verso l'Orchestrator ──────────────────────────────────────────
    # Il browser fa fetch('/api/run') invece di fetch('http://host:3010/run')
    # Nginx gira la richiesta internamente → nessuna porta esposta all'esterno.
    location /api/ {
        proxy_pass         http://orchestrator:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Necessario per lo streaming SSE / long-polling del /status
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ─── Proxy verso l'Executor ──────────────────────────────────────────────
    # Reports list, download report, ecc.
    location /executor/ {
        proxy_pass         http://executor:3004/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }
}
