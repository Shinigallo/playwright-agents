services:

  orchestrator:
    build: ./orchestrator
    ports:
      - "3000:3000"
    environment:
      - PLANNER_URL=http://planner:3001
      - GENERATOR_URL=http://generator:3002
      - HEALER_URL=http://healer:3003
      - EXECUTOR_URL=http://executor:3004
      - MAX_HEAL_ATTEMPTS=3
    depends_on:
      - planner
      - generator
      - healer
      - executor
    networks:
      - agents-net

  planner:
    build: ./planner
    expose:
      - "3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MODEL=${MODEL:-gemini-2.0-flash}  # or gemini-2.5-pro / gemini-3.0-ultra
    networks:
      - agents-net

  generator:
    build: ./generator
    expose:
      - "3002"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MODEL=${MODEL:-gemini-2.0-flash}  # or gemini-2.5-pro / gemini-3.0-ultra
    networks:
      - agents-net

  healer:
    build: ./healer
    expose:
      - "3003"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MODEL=${MODEL:-gemini-2.0-flash}  # or gemini-2.5-pro / gemini-3.0-ultra
    networks:
      - agents-net

  executor:
    build: ./executor
    expose:
      - "3004"
    volumes:
      - shared-tests:/shared/tests
      - shared-results:/shared/results
    networks:
      - agents-net

volumes:
  shared-tests:
  shared-results:

networks:
  agents-net:
    driver: bridge
