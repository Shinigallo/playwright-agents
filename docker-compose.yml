# ============================================================
# docker-compose.yml — Playwright AI Agents Stack
# ============================================================
# Definisce 6 container che formano il sistema di generazione
# e testing automatico con AI:
#
#   frontend     → UI statica nginx (porta 8089, reverse proxy verso /api/ e /executor/)
#   orchestrator → Coordinatore pipeline (solo interno, via nginx /api/)
#   planner      → Agente pianificazione (solo interno)
#   generator    → Agente generazione codice (solo interno)
#   healer       → Agente correzione errori (solo interno)
#   executor     → Esecuzione test Playwright (porta 3004 + 9300-9320)
#
# NETWORK: tutti i container comunicano sulla rete interna "agents-net"
# usando il nome del container come hostname (es. http://planner:3001).
# Le porte esterne sono ridotte al minimo: solo frontend (8089) ed executor (3004, 9300-9320).
# Orchestrator, planner, generator e healer comunicano solo sulla rete interna agents-net.
# Il browser raggiunge orchestrator tramite nginx (/api/) ed executor tramite nginx (/executor/).
#
# DNS: tutti i container usano Google DNS (8.8.8.8) per evitare problemi
# con resolver Pi-hole o router che non risolvono hostname pubblici.
# ============================================================

services:

  # ─────────────────────────────────────────────────────────
  # FRONTEND — UI statica servita da nginx
  # ─────────────────────────────────────────────────────────
  # Dashboard web per interagire con il sistema:
  # - Inserimento prompt e URL
  # - Visualizzazione stato live del pipeline
  # - Log in streaming
  # - Lista report con link al Trace Viewer
  frontend:
    build: ./frontend
    restart: unless-stopped  # si riavvia automaticamente in caso di crash
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8089:80"  # unico punto di accesso esterno — nginx serve il frontend e fa proxy verso orchestrator/executor
    depends_on:
      - orchestrator
      - executor
    networks:
      - agents-net

  # ─────────────────────────────────────────────────────────
  # ORCHESTRATOR — Cervello del sistema
  # ─────────────────────────────────────────────────────────
  # Riceve le richieste dal frontend e coordina il pipeline:
  # Planner → Generator → Executor (→ Healer loop)
  # Espone anche GET /status per il polling live dal frontend.
  orchestrator:
    build: ./orchestrator
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    expose:
      - "3000"  # solo interno — nginx fa proxy /api/ → orchestrator:3000
    environment:
      # URL dei microservizi — usano i nomi container come hostname (Docker DNS interno)
      - PLANNER_URL=http://planner:3001
      - GENERATOR_URL=http://generator:3002
      - HEALER_URL=http://healer:3003
      - EXECUTOR_URL=http://executor:3004
      # Numero massimo di tentativi di auto-healing prima di arrendersi
      - MAX_HEAL_ATTEMPTS=3
      # Provider LLM: "gemini" (default) o "openai" (Ollama, LM Studio, OpenAI, opencode, etc.)
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      # Pass-through delle chiavi API al planner (per rotazione)
      - GEMINI_API_KEYS=${GEMINI_API_KEYS:-}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
      - OPENAI_API_MODEL=${OPENAI_API_MODEL:-llama3.1}
      - MODEL=${MODEL:-gemini-2.0-flash}
    depends_on:
      - planner
      - generator
      - healer
      - executor
    networks:
      - agents-net

  # ─────────────────────────────────────────────────────────
  # PLANNER — Agente di pianificazione (LLM: Gemini)
  # ─────────────────────────────────────────────────────────
  # Riceve il prompt in linguaggio naturale e produce un piano
  # di test strutturato in JSON con titolo, URL e lista di step.
  planner:
    build: ./planner
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    expose:
      - "3001"  # solo interno — chiamato dall'orchestrator via http://planner:3001
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS:-}
      - MODEL=${MODEL:-gemini-2.0-flash}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENAI_API_MODEL=${OPENAI_API_MODEL:-llama3.1}
    networks:
      - agents-net

  # ─────────────────────────────────────────────────────────
  # GENERATOR — Agente di generazione codice
  # ─────────────────────────────────────────────────────────
  # Riceve il piano JSON e genera codice TypeScript Playwright
  # completo e pronto per l'esecuzione.
  generator:
    build: ./generator
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    expose:
      - "3002"  # solo interno — chiamato dall'orchestrator via http://generator:3002
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS:-}
      - MODEL=${MODEL:-gemini-2.0-flash}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENAI_API_MODEL=${OPENAI_API_MODEL:-llama3.1}
    networks:
      - agents-net

  # ─────────────────────────────────────────────────────────
  # HEALER — Agente di auto-correzione
  # ─────────────────────────────────────────────────────────
  # Interviene solo se il test fallisce. Analizza il codice
  # fallito + l'errore di Playwright e genera una versione corretta.
  healer:
    build: ./healer
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    expose:
      - "3003"  # solo interno — chiamato dall'orchestrator via http://healer:3003
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS:-}
      - MODEL=${MODEL:-gemini-2.0-flash}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENAI_API_MODEL=${OPENAI_API_MODEL:-llama3.1}
    networks:
      - agents-net

  # ─────────────────────────────────────────────────────────
  # EXECUTOR — Esecuzione test Playwright (con browser reale)
  # ─────────────────────────────────────────────────────────
  # UNICO container che usa l'immagine Playwright con Chromium
  # pre-installato. Tutti gli altri usano node:20-slim.
  # Esegue i .spec.ts, genera report HTML con Trace Viewer,
  # e serve ogni report su una porta dedicata (9300-9320).
  executor:
    build: ./executor
    restart: unless-stopped
    expose:
      - "3004"
    ports:
      - "3004:3004"        # API principale
      - "9300-9320:9300-9320"  # porta range per i server show-report (Trace Viewer)
    dns:
      - 8.8.8.8   # richiesto per accedere ai siti web dall'interno del container
      - 1.1.1.1
    volumes:
      # Volumi condivisi per ispezionare i file generati dall'host
      - shared-tests:/shared/tests      # .spec.ts scritti durante i run
      - shared-results:/shared/results  # risultati JSON di Playwright
    networks:
      - agents-net

# ─────────────────────────────────────────────────────────
# VOLUMI — Persistenti tra restart del container
# ─────────────────────────────────────────────────────────
# I volumi mantengono i test e i risultati tra restart del container.
# Utili per debuggare i .spec.ts generati dall'AI senza accedere al container.
volumes:
  shared-tests:   # codice TypeScript generato dall'AI
  shared-results: # risultati JSON dei run Playwright

# ─────────────────────────────────────────────────────────
# NETWORK — Rete bridge interna
# ─────────────────────────────────────────────────────────
# Tutti i container comunicano sulla rete interna usando i
# nomi container come hostname (Docker DNS integrato).
# Es: http://planner:3001, http://executor:3004
networks:
  agents-net:
    driver: bridge
