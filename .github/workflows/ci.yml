name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # planner/generator/healer usano context=. per includere ./services/shared;
        # executor/orchestrator restano con context per-servizio.
        include:
          - service: planner
            context: .
            file: planner/Dockerfile
          - service: generator
            context: .
            file: generator/Dockerfile
          - service: healer
            context: .
            file: healer/Dockerfile
          - service: executor
            context: ./executor
            file: executor/Dockerfile
          - service: orchestrator
            context: ./orchestrator
            file: orchestrator/Dockerfile
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [planner, generator, healer, executor, orchestrator]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install shared deps (LLM services)
        # planner/generator/healer importano ../../services/shared/gemini-proxy (ha il suo package.json)
        if: contains(fromJSON('["planner","generator","healer"]'), matrix.service)
        run: npm install --omit=dev
        working-directory: services/shared

      - name: Install deps
        run: npm install
        working-directory: ${{ matrix.service }}

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: ${{ matrix.service }}

  integration:
    name: Integration test (Planner → Generator → Healer)
    runs-on: ubuntu-latest
    needs: [build, typecheck]
    if: github.event_name == 'push' && env.GEMINI_API_KEY != ''
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MODEL: gemini-2.0-flash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          for port in 3000 3001 3002 3003 3004; do
            for i in $(seq 1 20); do
              curl -sf http://localhost:$port/health && break
              sleep 3
            done
          done

      - name: Run integration test
        run: |
          curl -sf -X POST http://localhost:3000/run \
            -H "Content-Type: application/json" \
            -d '{"prompt": "Check that playwright.dev loads and has a title", "baseUrl": "https://playwright.dev"}' \
            | tee result.json
          
          # Fail if passed != true
          cat result.json | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          print('Passed:', r.get('passed'))
          print('Log:')
          for l in r.get('log', []): print(' ', l)
          sys.exit(0 if r.get('passed') else 1)
          "

      - name: Show logs on failure
        if: failure()
        run: docker compose logs
